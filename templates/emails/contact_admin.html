<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#080E14;font-family:Inter,Arial,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#080E14;padding:40px 20px"><tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#0D1620;border:1px solid rgba(0,200,150,.2);border-radius:16px;overflow:hidden;max-width:600px;width:100%">
  <tr><td style="background:linear-gradient(135deg,#0A1E18,#0D1620);padding:28px 40px;border-bottom:1px solid rgba(0,200,150,.1)">
    <span style="font-family:Arial,sans-serif;font-weight:800;font-size:18px;color:#fff">Secure<span style="color:#00C896">Ledger</span></span>
    <span style="color:#475569;font-size:13px;margin-left:10px">· New Contact Message</span>
  </td></tr>
  <tr><td style="padding:32px 40px">
    <h2 style="color:#fff;font-size:18px;margin:0 0 20px;font-weight:700">📨 New message from the contact form</h2>
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#111D2B;border:1px solid rgba(0,200,150,.12);border-radius:12px;margin-bottom:20px">
      <tr><td style="padding:20px 24px">
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr><td style="color:#475569;font-size:13px;padding:6px 0;width:90px">Name</td><td style="color:#E2E8F0;font-size:14px;font-weight:600">{{ full_name }}</td></tr>
          <tr><td style="color:#475569;font-size:13px;padding:6px 0">Email</td><td style="color:#00C896;font-size:14px"><a href="mailto:{{ email }}" style="color:#00C896;text-decoration:none">{{ email }}</a></td></tr>
          <tr><td style="color:#475569;font-size:13px;padding:6px 0">Phone</td><td style="color:#E2E8F0;font-size:14px">{{ phone|default:"—" }}</td></tr>
          <tr><td style="color:#475569;font-size:13px;padding:6px 0">Subject</td><td style="color:#E2E8F0;font-size:14px">{{ subject|default:"—" }}</td></tr>
        </table>
      </td></tr>
    </table>
    <div style="background:#0F1A25;border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:18px 22px">
      <span style="color:#475569;font-size:11px;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:8px">Message</span>
      <p style="color:#E2E8F0;font-size:14px;line-height:1.7;margin:0;white-space:pre-line">{{ message }}</p>
    </div>
    <p style="color:#475569;font-size:13px;margin:20px 0 0">Reply directly to this email to respond to {{ full_name }}.</p>
  </td></tr>
</table>
</td></tr></table></body></html>
