{% extends 'dashboard/base.html' %}
{% block title %}Crypto Exchange{% endblock %}
{% block content %}
<div style="margin-bottom:1.5rem"><h1 class="font-display font-bold text-white" style="font-size:1.4rem">Crypto Exchange</h1><p style="color:#475569;font-size:.85rem;margin-top:.25rem">Live crypto conversion rates and exchange widget.</p></div>
<div class="panel" style="overflow:hidden">
  <div class="panel-header"><div class="panel-title"><div class="live-dot"></div>Live Exchange Rates</div></div>
  <div style="padding:0">
    <!-- TradingView Crypto Screener Widget -->
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
      {"width":"100%","height":600,"defaultColumn":"overview","defaultScreen":"crypto","market":"crypto","showToolbar":true,"colorTheme":"dark","locale":"en","backgroundColor":"#0D1620","isTransparent":false}
      </script>
    </div>
  </div>
</div>
{% endblock %}
